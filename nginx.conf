server {
    listen       80;
    listen       [::]:80;
    server_name  docs.openeos.de;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/xml application/manifest+json;

    # Long-lived caching for fingerprinted assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # HTML should always be re-validated
    location / {
        add_header Cache-Control "no-cache";
        # Docusaurus emits <route>/index.html – resolve clean URLs
        try_files $uri $uri/ $uri.html /404.html;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
